# ============================================================================
# Recommended #5: Safest High-Performer
# ============================================================================
# Source: Grid search over 972 configs, replayed on 5 live games from 2026-02-24
# Rank: #11 by total PnL (tied #11/#12), #1 by win rate among configs with 10+ trades
#
# Backtested Stats (2026-02-24, 5 games, bankroll=$500):
#   Total PnL:   +$33.21
#   Trades:      19 round-trips
#   Win/Loss:    18W / 1L
#   Win Rate:    94.7%
#
#   Per-Game Breakdown:
#     DAL @ BKN:  +$12.45  (DAL won 123-114)
#     OKC @ TOR:  +$17.72  (OKC won 110-101)
#     NY  @ CLE:  +$ 2.67  (CLE won 98-78)
#     PHI @ IND:  +$ 0.37  (PHI won 131-110)
#     WSH @ ATL:  +$ 0.00  (no trades triggered, blowout)
#
# Key Characteristics:
#   - Highest win rate of all top configs: 94.7% (only 1 loss in 19 trades)
#   - All 4 active games profitable (no losing game)
#   - 20% stop loss gives ample room; combined with 2% PT = quick winners, rare stops
#   - Best choice for risk-averse deployment: nearly never loses a trade
#   - Slightly less PnL than rec1 due to wider SL holding losers slightly longer
#
# vs Live Session (very_aggressive_fast, edge=3%, kelly=0.4x):
#   Live PnL: -$0.08 | This config: +$33.21 | Improvement: +$33.29
# ============================================================================

metadata:
  name: "Recommended #5: Safest High-Performer"
  description: "Highest win rate config from 20260224 grid search. Edge=2%, SL=20%, PT=2%, Kelly=0.6x. 19 trades, 95% WR, +$33.21."
  risk_level: "high"
  enabled: true

factor_weights:
  market_sentiment: 0.45
  game_context: 0.35
  team_strength: 0.20

entry_rules:
  conditions:
    - name: "minimum_edge"
      type: "threshold"
      field: "edge_percentage"
      operator: ">="
      value: 2.0

    - name: "minimum_confidence"
      type: "threshold"
      field: "confidence"
      operator: ">="
      value: 5

    - name: "time_remaining"
      type: "threshold"
      field: "total_seconds_remaining"
      operator: ">="
      value: 180

    - name: "price_range_low"
      type: "threshold"
      field: "market_price"
      operator: ">="
      value: 0.15

    - name: "price_range_high"
      type: "threshold"
      field: "market_price"
      operator: "<="
      value: 0.75

exit_rules:
  profit_targets:
    - time_remaining_min: 1200
      target_percentage: 2.0
    - time_remaining_min: 600
      target_percentage: 2.0
    - time_remaining_min: 300
      target_percentage: 2.0
    - time_remaining_min: 0
      target_percentage: 2.0

  stop_loss:
    value: 20.0
    late_game_widening:
      - time_remaining_max: 600
        multiplier: 1.3
      - time_remaining_max: 300
        multiplier: 1.5

  time_stop:
    exit_before_seconds: 30

position_sizing:
  method: "kelly_fraction"
  kelly_multiplier: 0.60
  max_position_usdc: 250
  min_position_usdc: 10

risk_limits:
  max_concurrent_positions: 5
  max_daily_loss_usdc: 300
  max_position_per_game: 2
  cooldown_iterations: 10
  max_stop_losses_per_game: 2
  max_loss_per_game_usdc: 15
