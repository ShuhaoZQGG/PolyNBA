# ============================================================================
# Recommended #1: Aggressive Scalper
# ============================================================================
# Source: Grid search over 972 configs, replayed on 5 live games from 2026-02-24
# Rank: #1 by total PnL out of 972 tested configurations
#
# Backtested Stats (2026-02-24, 5 games, bankroll=$500):
#   Total PnL:   +$39.49
#   Trades:      22 round-trips
#   Win/Loss:    18W / 4L
#   Win Rate:    81.8%
#
#   Per-Game Breakdown:
#     DAL @ BKN:  +$14.40  (DAL won 123-114)
#     OKC @ TOR:  +$23.82  (OKC won 110-101)
#     NY  @ CLE:  +$ 0.17  (CLE won 98-78)
#     PHI @ IND:  +$ 1.10  (PHI won 131-110)
#     WSH @ ATL:  +$ 0.00  (no trades triggered, blowout)
#
# Key Characteristics:
#   - Highest absolute PnL across all tested configs
#   - 2% edge filter balances signal volume vs quality
#   - 2% flat profit target enables rapid scalping (quick in/out)
#   - 15% stop loss with late-game widening avoids whipsaws
#   - 0.6x Kelly provides meaningfully larger positions than default 0.4x
#
# vs Live Session (very_aggressive_fast, edge=3%, kelly=0.4x):
#   Live PnL: -$0.08 | This config: +$39.49 | Improvement: +$39.57
# ============================================================================

metadata:
  name: "Recommended #1: Aggressive Scalper"
  description: "Top PnL config from 20260224 grid search. Edge=2%, SL=15%, PT=2%, Kelly=0.6x. 22 trades, 82% WR, +$39.49."
  risk_level: "high"
  enabled: true

factor_weights:
  market_sentiment: 0.45
  game_context: 0.35
  team_strength: 0.20

entry_rules:
  conditions:
    - name: "minimum_edge"
      type: "threshold"
      field: "edge_percentage"
      operator: ">="
      value: 2.0

    - name: "minimum_confidence"
      type: "threshold"
      field: "confidence"
      operator: ">="
      value: 5

    - name: "time_remaining"
      type: "threshold"
      field: "total_seconds_remaining"
      operator: ">="
      value: 180

    - name: "price_range_low"
      type: "threshold"
      field: "market_price"
      operator: ">="
      value: 0.15

    - name: "price_range_high"
      type: "threshold"
      field: "market_price"
      operator: "<="
      value: 0.75

    - name: "max_spread"
      type: "threshold"
      field: "spread_percentage"
      operator: "<="
      value: 8.0  # Skip entry when bid-ask spread is too wide

exit_rules:
  profit_targets:
    - time_remaining_min: 1200
      target_percentage: 2.0
    - time_remaining_min: 600
      target_percentage: 2.0
    - time_remaining_min: 300
      target_percentage: 2.0
    - time_remaining_min: 0
      target_percentage: 2.0

  stop_loss:
    value: 15.0
    exit_max_spread_percent: 15.0  # Suppress stop loss when spread > 15% (thin book)
    late_game_widening:
      - time_remaining_max: 600
        multiplier: 1.3
      - time_remaining_max: 300
        multiplier: 1.5

  time_stop:
    exit_before_seconds: 30

position_sizing:
  method: "kelly_fraction"
  kelly_multiplier: 0.60
  max_position_usdc: 250
  min_position_usdc: 10

risk_limits:
  max_concurrent_positions: 5
  max_daily_loss_usdc: 300
  max_position_per_game: 2
  cooldown_iterations: 10
  max_stop_losses_per_game: 2
  max_loss_per_game_usdc: 15
