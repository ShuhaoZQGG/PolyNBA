# PolyNBA Configuration

# Trading mode: "paper" for simulation, "live" for real trading
mode: "paper"

# Total bankroll in USDC
bankroll: 500.0

# Active strategies (by filename without .yaml)
active_strategies:
  - "conservative"
  - "aggressive"

# Main loop settings
loop:
  interval_seconds: 30  # Main loop interval
  max_iterations: null  # null for unlimited

# Data sources
data:
  primary_source: "espn"  # "espn" or "nba"
  cache:
    live_game_ttl: 15
    scoreboard_ttl: 30
    team_stats_ttl: 3600

# API configurations
apis:
  claude:
    model: "claude-haiku-4-5-20251001"
    daily_budget_usd: 10.0
    min_interval_seconds: 120
    enabled: true

  polymarket:
    host: "https://clob.polymarket.com"
    gamma_api: "https://gamma-api.polymarket.com"
    rpc_url: "https://polygon-rpc.com"
    chain_id: 137
    websocket_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
    # Market discovery settings
    discovery:
      cache_ttl_seconds: 300  # 5 minutes - how long to cache discovered markets
    # Price fetching settings
    prices:
      poll_interval_seconds: 15  # How often to refresh prices
      fallback_to_simulated: true  # Use simulated prices if no real market found
      min_liquidity_usdc: 100  # Minimum liquidity to consider market tradeable

# Edge detection (buy filters)
edge:
  min_edge_percent: 5.0
  max_edge_percent: 50.0
  min_confidence: 5
  min_market_price: 0.10
  max_market_price: 0.90
  min_time_remaining_seconds: 300
  exclude_overtime: false

# Exit overrides (sell; null = use strategy YAML)
exit:
  stop_loss_percent: null
  exit_before_seconds: null
  profit_target_percent: null  # e.g. 15.0 = take profit at 15% (overrides strategy buckets)

# Risk limits (wired to RiskManager)
risk:
  max_position_usdc: 100
  max_total_exposure_usdc: 500
  max_daily_loss_usdc: 100
  max_concurrent_positions: 5
  max_position_per_market: 2
  min_order_size_usdc: 5
  max_order_size_usdc: 50
  min_position_usdc: null   # Global min; skip signal if size below (null = use strategy)

# Bettable % of balance: max fraction of bankroll that can be in positions
allocation:
  max_portfolio_exposure: 0.50   # Max 50% of balance bettable
  low_risk_percent: 0.50
  medium_risk_percent: 0.35
  high_risk_percent: 0.15

# Strategy / conflict resolution
trading:
  conflict_min_confidence: 7   # Take conflicting side only if confidence >= this

# Position sizing overrides (null = use strategy YAML)
position_sizing:
  kelly_multiplier_override: null   # e.g. 0.5 = half Kelly; null = use strategy

# Logging
logging:
  level: "INFO"
  file: "polynba.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Performance tracking
performance:
  track_trades: true
  save_interval_minutes: 15
  report_file: "performance.json"

# Portfolio display - shows session summary during bot execution
portfolio_display:
  interval: 1           # Show summary every N iterations (0 to disable)
  compact: false        # Use compact one-line format instead of full box

# Command server - accepts interactive commands from another terminal
command_server:
  enabled: true
  host: "127.0.0.1"
  port: 8765
