# Profile: live + rec4_aggressive_e15_sl20_pt3_k06
# Recommended #4: Balanced Scalper
# Backtested: 23 trades, 87% WR, +$34.53 (2026-02-24, 5 games)
mode: "live"
bankroll: 1000.0
active_strategies:
  - "rec4_aggressive_e15_sl20_pt3_k06"

loop:
  interval_seconds: 30
  max_iterations: null

data:
  primary_source: "espn"
  cache:
    live_game_ttl: 15
    scoreboard_ttl: 30
    team_stats_ttl: 3600

apis:
  claude:
    model: "claude-haiku-4-5-20251001"
    daily_budget_usd: 10.0
    min_interval_seconds: 120
    enabled: true
  polymarket:
    host: "https://clob.polymarket.com"
    gamma_api: "https://gamma-api.polymarket.com"
    rpc_url: "https://polygon-rpc.com"
    chain_id: 137
    websocket_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
    discovery:
      cache_ttl_seconds: 300
    prices:
      poll_interval_seconds: 15
      fallback_to_simulated: false
      min_liquidity_usdc: 100

# Pre-filter must be <= strategy min_edge (1.5%) to avoid blocking signals
edge:
  min_edge_percent: 1.5
  max_edge_percent: 50.0
  min_confidence: 5
  min_market_price: 0.15
  max_market_price: 0.75
  min_time_remaining_seconds: 180
  exclude_overtime: false
  volatility:
    score_threshold: 5        # "tight" if abs(score diff) < 5
    period_threshold: 3       # "late" if Q3+ (period >= 3)
    edge_multiplier: 1.5      # Raise min_edge by 1.5x when volatile

exit:
  stop_loss_percent: null
  exit_before_seconds: null
  profit_target_percent: null

risk:
  max_position_usdc: 250
  max_total_exposure_usdc: 800
  max_daily_loss_usdc: 300
  max_concurrent_positions: 5
  max_position_per_market: 2
  min_order_size_usdc: 3
  max_order_size_usdc: 250
  min_position_usdc: null
  max_loss_per_game_usdc: 15

allocation:
  max_portfolio_exposure: 0.55
  low_risk_percent: 0.50
  medium_risk_percent: 0.35
  high_risk_percent: 0.15

trading:
  conflict_min_confidence: 7

position_sizing:
  kelly_multiplier_override: null

logging:
  level: "INFO"
  file: "polynba.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

performance:
  track_trades: true
  save_interval_minutes: 15
  report_file: "performance.json"

portfolio_display:
  interval: 1
  compact: false

command_server:
  enabled: true
  host: "127.0.0.1"
  port: 8765
