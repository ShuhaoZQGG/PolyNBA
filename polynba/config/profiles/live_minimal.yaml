# Profile: live + conservative + minimal exposure (safest first live run)
# Use a dedicated wallet with ~50 USDC + MATIC. Optional: --max-iterations 20 for a short test.
mode: "live"
bankroll: 50.0
active_strategies:
  - "conservative"

loop:
  interval_seconds: 30
  max_iterations: 20  # Optional cap for first run; set to null for unlimited

data:
  primary_source: "espn"
  cache:
    live_game_ttl: 15
    scoreboard_ttl: 30
    team_stats_ttl: 3600

apis:
  claude:
    model: "claude-haiku-4-5-20251001"
    daily_budget_usd: 10.0
    min_interval_seconds: 120
    enabled: true
  polymarket:
    host: "https://clob.polymarket.com"
    gamma_api: "https://gamma-api.polymarket.com"
    rpc_url: "https://polygon-rpc.com"
    chain_id: 137
    websocket_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
    discovery:
      cache_ttl_seconds: 300
    prices:
      poll_interval_seconds: 15
      fallback_to_simulated: false  # Live: only trade on real market data
      min_liquidity_usdc: 100

edge:
  min_edge_percent: 8.0
  max_edge_percent: 50.0
  min_confidence: 6
  min_market_price: 0.10
  max_market_price: 0.90
  min_time_remaining_seconds: 300
  exclude_overtime: false

exit:
  stop_loss_percent: null
  exit_before_seconds: null
  profit_target_percent: null

risk:
  max_position_usdc: 20
  max_total_exposure_usdc: 50
  max_daily_loss_usdc: 25
  max_concurrent_positions: 1
  max_position_per_market: 1
  min_order_size_usdc: 5
  max_order_size_usdc: 10
  min_position_usdc: null

allocation:
  max_portfolio_exposure: 0.25
  low_risk_percent: 0.50
  medium_risk_percent: 0.35
  high_risk_percent: 0.15

trading:
  conflict_min_confidence: 7

position_sizing:
  kelly_multiplier_override: null

logging:
  level: "INFO"
  file: "polynba.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

performance:
  track_trades: true
  save_interval_minutes: 15
  report_file: "performance.json"

portfolio_display:
  interval: 1
  compact: false

command_server:
  enabled: true
  host: "127.0.0.1"
  port: 8765
