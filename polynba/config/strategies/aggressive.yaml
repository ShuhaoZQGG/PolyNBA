metadata:
  name: "Aggressive Mean Reversion"
  description: "Higher-risk strategy targeting larger edges with more capital"
  risk_level: "high"
  enabled: true

factor_weights:
  market_sentiment: 0.45
  game_context: 0.35
  team_strength: 0.20

entry_rules:
  conditions:
    - name: "minimum_edge"
      type: "threshold"
      field: "edge_percentage"
      operator: ">="
      value: 3.0  # Lower edge threshold

    - name: "minimum_confidence"
      type: "threshold"
      field: "confidence"
      operator: ">="
      value: 5  # Lower confidence threshold

    - name: "time_remaining"
      type: "threshold"
      field: "total_seconds_remaining"
      operator: ">="
      value: 180  # 3 minutes

    - name: "price_range_low"
      type: "threshold"
      field: "market_price"
      operator: ">="
      value: 0.15

    - name: "price_range_high"
      type: "threshold"
      field: "market_price"
      operator: "<="
      value: 0.75

    - name: "max_spread"
      type: "threshold"
      field: "spread_percentage"
      operator: "<="
      value: 8.0  # Skip entry when spread is too wide

exit_rules:
  profit_targets:
    - time_remaining_min: 1200
      target_percentage: 18.0
    - time_remaining_min: 600
      target_percentage: 12.0
    - time_remaining_min: 300
      target_percentage: 6.0

  stop_loss:
    value: 25.0  # Higher stop loss tolerance
    exit_max_spread_percent: 15.0  # Suppress stop loss when spread > 15% (thin book)
    patience_before_seconds: 300    # Suppress SL when > 5 min left
    max_averagedown_count: 2        # Allow 2 average-down buys
    max_averagedown_multiplier: 3.0 # Max 3x initial cost
    late_game_widening:
      - time_remaining_max: 600   # <= 10 min: 1.3x → 32.5%
        multiplier: 1.3
      - time_remaining_max: 300   # <= 5 min: 1.5x → 37.5%
        multiplier: 1.5

  time_stop:
    exit_before_seconds: 30

position_sizing:
  method: "kelly_fraction"
  kelly_multiplier: 0.40  # More aggressive sizing
  max_position_usdc: 250
  min_position_usdc: 10

risk_limits:
  max_concurrent_positions: 5
  max_daily_loss_usdc: 300
  max_position_per_game: 2
  cooldown_iterations: 10
  max_stop_losses_per_game: 2
  max_loss_per_game_usdc: 15
  profit_cooldown_iterations: 5
