metadata:
  name: "Conviction Winner"
  description: "Hold-to-resolution bets on high-probability winners with AI confirmation"
  risk_level: "high"
  enabled: true

factor_weights:
  market_sentiment: 0.35
  game_context: 0.35
  team_strength: 0.30

entry_rules:
  conditions:
    - name: "high_probability"
      type: "threshold"
      field: "estimated_probability"
      operator: ">="
      value: 0.65

    - name: "minimum_confidence"
      type: "threshold"
      field: "confidence"
      operator: ">="
      value: 7

    - name: "minimum_edge"
      type: "threshold"
      field: "edge_percentage"
      operator: ">="
      value: 1.0    # Small positive edge required (no buying overpriced)

    - name: "time_remaining"
      type: "threshold"
      field: "total_seconds_remaining"
      operator: ">="
      value: 600    # 10 minutes minimum (need time for conviction to play out)

    - name: "price_range_low"
      type: "threshold"
      field: "market_price"
      operator: ">="
      value: 0.50   # Token should already indicate likely winner

    - name: "price_range_high"
      type: "threshold"
      field: "market_price"
      operator: "<="
      value: 0.85   # Don't buy above 85c (limited upside)

    - name: "max_spread"
      type: "threshold"
      field: "spread_percentage"
      operator: "<="
      value: 5.0

exit_rules:
  profit_targets: []      # No profit targets — hold to resolution

  stop_loss:
    value: 40.0           # Wide stop — conviction bets ride volatility
    exit_max_spread_percent: 15.0  # Suppress stop loss when spread > 15% (thin book)
    late_game_widening:
      - time_remaining_max: 600
        multiplier: 1.3
      - time_remaining_max: 300
        multiplier: 1.5

  time_stop:
    exit_before_seconds: 30

position_sizing:
  method: "kelly_fraction"
  kelly_multiplier: 0.30
  max_position_usdc: 150
  min_position_usdc: 10

risk_limits:
  max_concurrent_positions: 2
  max_daily_loss_usdc: 200
  max_position_per_game: 1
  cooldown_iterations: 15
  max_stop_losses_per_game: 1   # Only 1 shot per game for conviction
  max_loss_per_game_usdc: 20
